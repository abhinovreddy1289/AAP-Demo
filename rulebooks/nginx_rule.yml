---
- name: Restart nginx when down
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

rules:
  - name: Restart nginx
    hosts: localhost
    tasks:
      - name: Run nginx playbook
        run_playbook:
          name: nginx.yml
          project: MyGitProject
          inventory:
            hosts:
              localhost:
                ansible_connection: local