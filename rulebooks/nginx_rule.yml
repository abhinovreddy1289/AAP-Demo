---
- name: Restart nginx when down
  hosts: all
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Restart nginx
      condition: event.payload.alerts[0].labels.alertname == "NginxDown"
      actions:
        - run_playbook:
            name: nginx.yml
            inventory: "localhost,"