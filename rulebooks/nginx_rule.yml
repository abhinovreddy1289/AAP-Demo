---
- name: Restart nginx when down
  hosts: localhost
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000

  rules:
    - name: Restart nginx
      condition: >
        event.payload is defined and
        event.payload.alerts is defined and
        event.payload.alerts[0].labels.alertname == "NginxDown"
      action:
        run_job_template:
          name: Restart Nginx
          organization: Default